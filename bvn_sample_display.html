<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BVN Sample Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-200 p-8 flex flex-col items-center gap-8">

    <!-- Container showing the sample image to users -->
    <div class="w-[600px] bg-white border border-gray-300 rounded-2xl shadow-lg p-6 flex flex-col items-center">
        <h2 class="text-xl font-bold mb-4 text-blue-900 uppercase">BVN Card Verification Sample</h2>
        
        <!-- The image tag where you put the actual picture -->
        <!-- Just replace 'sample_image.jpg' with the actual name of your image file -->
        <img src="assets/images/sample_image.jpg" alt="BVN Sample Image" class="w-full h-auto rounded-xl shadow border border-gray-300">
        
        <p class="mt-4 text-gray-600 text-sm font-semibold">Wannan shine hoton sample din (This is the sample image)</p>
    </div>

</body>
</html>
